<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #e5e5e5; padding: 16px; font-size: 13px; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    .status-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
    .status-row .label { color: #888; }
    .status-row .value { color: #fff; font-weight: 500; }
    .status-row .value.success { color: #22c55e; }
    .status-row .value.warning { color: #f59e0b; }
    .status-row .value.error { color: #ef4444; }
    .panel { background: #1a1a1a; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
    .panel label { color: #888; font-size: 12px; display: block; margin-bottom: 6px; }
    .panel input { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 12px; }
    .panel input:focus { outline: none; border-color: #22c55e; }
    .panel .member { color: #fff; font-weight: 500; margin-bottom: 2px; }
    .panel .email { color: #888; font-size: 11px; }
    button { background: #22c55e; color: #000; border: none; padding: 8px 12px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: transparent; color: #888; padding: 0; font-weight: 400; text-decoration: underline; font-size: 12px; margin-top: 8px; }
    button.full { width: 100%; margin-top: 12px; }
    .error-msg { color: #ef4444; font-size: 12px; margin-top: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Upwork Tracker</h1>

  <div id="unauth" class="panel hidden">
    <label for="tokenInput">Paste your extension token</label>
    <input id="tokenInput" type="password" placeholder="ut_..." autocomplete="off" spellcheck="false" />
    <button id="saveTokenBtn" class="full">Save</button>
    <div id="authError" class="error-msg"></div>
  </div>

  <div id="authed" class="panel hidden">
    <div class="member" id="memberName">--</div>
    <div class="email" id="memberEmail">--</div>
    <button class="secondary" id="signOutBtn">Change token</button>
  </div>

  <div class="status-row"><span class="label">Account</span><span class="value" id="account">--</span></div>
  <div class="status-row"><span class="label">Last Sync</span><span class="value" id="lastSync">Never</span></div>
  <div class="status-row"><span class="label">Total Syncs</span><span class="value" id="syncCount">0</span></div>
  <div class="status-row"><span class="label">Queued</span><span class="value" id="queuedCount">0</span></div>
  <div class="status-row"><span class="label">Status</span><span class="value" id="status">--</span></div>

  <button id="forceSyncBtn" class="full hidden">Force Sync</button>

  <script src="popup.js"></script>
</body>
</html>
