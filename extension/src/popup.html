<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #e5e5e5; padding: 16px; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    .status-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 13px; }
    .status-row .label { color: #888; }
    .status-row .value { color: #fff; font-weight: 500; }
    .status-row .value.success { color: #22c55e; }
    .status-row .value.warning { color: #f59e0b; }
  </style>
</head>
<body>
  <h1>Upwork Tracker</h1>

  <div class="status-row">
    <span class="label">Account</span>
    <span class="value" id="account">--</span>
  </div>
  <div class="status-row">
    <span class="label">Last Sync</span>
    <span class="value" id="lastSync">Never</span>
  </div>
  <div class="status-row">
    <span class="label">Total Syncs</span>
    <span class="value" id="syncCount">0</span>
  </div>
  <div class="status-row">
    <span class="label">Status</span>
    <span class="value" id="status">--</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
